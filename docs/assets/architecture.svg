  <text x="487" y="190" text-anchor="middle" fill="#64748b" font-size="8">list · get · summarize</text>
  <text x="487" y="202" text-anchor="middle" fill="#64748b" font-size="8">create · add_widget</text>
  <text x="487" y="214" text-anchor="middle" fill="#64748b" font-size="8">publish</text>

