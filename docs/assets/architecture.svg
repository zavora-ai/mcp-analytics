  <rect x="665" y="147" width="210" height="24" rx="3" fill="#334155"/>
  <text x="770" y="163" text-anchor="middle" fill="#64748b" font-size="9">○ Mixpanel (planned)</text>
  <rect x="665" y="179" width="210" height="24" rx="3" fill="#334155"/>
  <text x="770" y="195" text-anchor="middle" fill="#64748b" font-size="9">○ PostHog (planned)</text>
  <rect x="665" y="211" width="210" height="24" rx="3" fill="#334155"/>
  <text x="770" y="227" text-anchor="middle" fill="#64748b" font-size="9">○ Amplitude (planned)</text>
  <rect x="665" y="243" width="210" height="24" rx="3" fill="#334155"/>
  <text x="770" y="259" text-anchor="middle" fill="#64748b" font-size="9">○ BigQuery (planned)</text>

  <rect x="665" y="280" width="210" height="40" rx="3" fill="#0f172a" stroke="#475569"/>
  <text x="770" y="297" text-anchor="middle" fill="#94a3b8" font-size="8">Seeded: 3 sources, 4 datasets</text>
  <text x="770" y="310" text-anchor="middle" fill="#94a3b8" font-size="8">8 metrics, 5 segments, 2 funnels</text>

  <text x="480" y="425" text-anchor="middle" fill="#475569" font-size="10">mcp-analytics v1.0.0 · 28 tools · Governed · Policy-enforced · Audit-logged</text>
