  <rect x="30" y="152" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="166" text-anchor="middle" fill="#f1f5f9" font-size="9">Claude / Kiro</text>
  <rect x="30" y="177" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="191" text-anchor="middle" fill="#f1f5f9" font-size="9">Cursor / Codex</text>
