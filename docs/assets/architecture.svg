  <text x="302" y="125" text-anchor="middle" fill="#64748b" font-size="8">data_sources · datasets · describe</text>
  <text x="302" y="137" text-anchor="middle" fill="#64748b" font-size="8">metrics · metric_definition</text>

  <!-- Querying -->
  <rect x="400" y="95" width="175" height="55" rx="4" fill="#1e293b"/>
  <text x="487" y="111" text-anchor="middle" fill="#fbbf24" font-size="9">QUERYING (5)</text>
  <text x="487" y="125" text-anchor="middle" fill="#64748b" font-size="8">query · breakdown · compare</text>
  <text x="487" y="137" text-anchor="middle" fill="#64748b" font-size="8">events · report</text>

